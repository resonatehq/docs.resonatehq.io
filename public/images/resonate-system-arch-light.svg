<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="Sansation, system-ui, sans-serif">
  <defs>
    <radialGradient id="r-glow-l" cx="0.5" cy="0.82" r="0.6">
      <stop offset="0" stop-color="#1EE3CF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1EE3CF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="920" height="520" fill="#FAFAF7"/>
  <rect x="0" y="280" width="920" height="240" fill="url(#r-glow-l)"/>
  <rect x="0.75" y="0.75" width="918.5" height="518.5" fill="none" stroke="#DCDAD4" stroke-width="1.5"/>

  <!-- eyebrow -->
  <rect x="40" y="34" width="10" height="10" fill="#0D9488"/>
  <text x="60" y="43" fill="#617196" font-size="13" letter-spacing="2.5">DECENTRALIZED  ·  M : N  ·  MESH TOPOLOGY</text>

  <!-- mesh edges -->
  <g stroke="#0FB3A1" stroke-width="1.6" fill="none" opacity="0.6">
    <path d="M160 136 L160 360"/>
    <path d="M160 136 L360 360"/>
    <path d="M360 136 L160 360"/>
    <path d="M360 136 L360 360"/>
    <path d="M360 136 L560 360"/>
    <path d="M560 136 L360 360"/>
    <path d="M560 136 L560 360"/>
    <path d="M760 136 L560 360"/>
    <path d="M760 136 L360 360"/>
  </g>

  <!-- worker nodes -->
  <g>
    <rect x="85"  y="78" width="150" height="58" fill="#FFFFFF" stroke="#B5B2AB" stroke-width="1.5"/>
    <text x="160" y="105" text-anchor="middle" fill="#313749" font-size="17">Worker</text>
    <text x="160" y="123" text-anchor="middle" fill="#818FAF" font-size="12" font-family="system-ui, sans-serif">1</text>
    <rect x="285" y="78" width="150" height="58" fill="#FFFFFF" stroke="#B5B2AB" stroke-width="1.5"/>
    <text x="360" y="105" text-anchor="middle" fill="#313749" font-size="17">Worker</text>
    <text x="360" y="123" text-anchor="middle" fill="#818FAF" font-size="12" font-family="system-ui, sans-serif">2</text>
    <rect x="485" y="78" width="150" height="58" fill="#FFFFFF" stroke="#B5B2AB" stroke-width="1.5"/>
    <text x="560" y="105" text-anchor="middle" fill="#313749" font-size="17">Worker</text>
    <text x="560" y="123" text-anchor="middle" fill="#818FAF" font-size="12" font-family="system-ui, sans-serif">3</text>
    <rect x="685" y="78" width="150" height="58" fill="#FFFFFF" stroke="#B5B2AB" stroke-width="1.5"/>
    <text x="760" y="105" text-anchor="middle" fill="#313749" font-size="17">Worker</text>
    <text x="760" y="123" text-anchor="middle" fill="#818FAF" font-size="12" font-family="system-ui, sans-serif">N</text>
  </g>

  <!-- resonate server nodes (teal, single binary) -->
  <g>
    <rect x="95"  y="360" width="130" height="56" fill="#ECFDF8" stroke="#0D9488" stroke-width="1.5"/>
    <rect x="295" y="360" width="130" height="56" fill="#ECFDF8" stroke="#0D9488" stroke-width="1.5"/>
    <rect x="495" y="360" width="130" height="56" fill="#ECFDF8" stroke="#0D9488" stroke-width="1.5"/>
    <text x="160" y="385" text-anchor="middle" fill="#0D9488" font-size="15">Resonate</text>
    <text x="160" y="403" text-anchor="middle" fill="#0FB3A1" font-size="11" font-family="system-ui, sans-serif">single binary</text>
    <text x="360" y="385" text-anchor="middle" fill="#0D9488" font-size="15">Resonate</text>
    <text x="360" y="403" text-anchor="middle" fill="#0FB3A1" font-size="11" font-family="system-ui, sans-serif">single binary</text>
    <text x="560" y="385" text-anchor="middle" fill="#0D9488" font-size="15">Resonate</text>
    <text x="560" y="403" text-anchor="middle" fill="#0FB3A1" font-size="11" font-family="system-ui, sans-serif">single binary</text>
  </g>

  <!-- dashed "add as you scale" node -->
  <rect x="695" y="360" width="130" height="56" fill="none" stroke="#0D9488" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.75"/>
  <text x="760" y="384" text-anchor="middle" fill="#0D9488" font-size="22" opacity="0.9">+</text>
  <text x="760" y="404" text-anchor="middle" fill="#0FB3A1" font-size="11" font-family="system-ui, sans-serif" opacity="0.9">add as you scale</text>
</svg>
