<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="Sansation, system-ui, sans-serif">
  <defs>
    <linearGradient id="r-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11151C"/>
      <stop offset="1" stop-color="#0C0F14"/>
    </linearGradient>
    <radialGradient id="r-glow" cx="0.5" cy="0.78" r="0.6">
      <stop offset="0" stop-color="#1EE3CF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#1EE3CF" stop-opacity="0"/>
    </radialGradient>
    <filter id="teal-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="920" height="520" fill="url(#r-panel)"/>
  <rect x="0" y="250" width="920" height="270" fill="url(#r-glow)"/>
  <rect x="0.75" y="0.75" width="918.5" height="518.5" fill="none" stroke="#222A36" stroke-width="1.5"/>

  <!-- eyebrow -->
  <rect x="40" y="34" width="10" height="10" fill="#1EE3CF"/>
  <text x="60" y="43" fill="#94A3B8" font-size="13" letter-spacing="2.5">DECENTRALIZED  ·  M : N  ·  MESH TOPOLOGY</text>

  <!-- mesh edges (drawn first, behind nodes) -->
  <g stroke="#1EE3CF" stroke-width="1.6" fill="none" opacity="0.45">
    <path d="M160 136 L160 360"/>
    <path d="M160 136 L360 360"/>
    <path d="M360 136 L160 360"/>
    <path d="M360 136 L360 360"/>
    <path d="M360 136 L560 360"/>
    <path d="M560 136 L360 360"/>
    <path d="M560 136 L560 360"/>
    <path d="M760 136 L560 360"/>
    <path d="M760 136 L360 360"/>
  </g>

  <!-- worker nodes -->
  <g>
    <rect x="85"  y="78" width="150" height="58" fill="#161A22" stroke="#2A323F" stroke-width="1.5"/>
    <text x="160" y="105" text-anchor="middle" fill="#E4E7EB" font-size="17">Worker</text>
    <text x="160" y="123" text-anchor="middle" fill="#5B6678" font-size="12" font-family="system-ui, sans-serif">1</text>
    <rect x="285" y="78" width="150" height="58" fill="#161A22" stroke="#2A323F" stroke-width="1.5"/>
    <text x="360" y="105" text-anchor="middle" fill="#E4E7EB" font-size="17">Worker</text>
    <text x="360" y="123" text-anchor="middle" fill="#5B6678" font-size="12" font-family="system-ui, sans-serif">2</text>
    <rect x="485" y="78" width="150" height="58" fill="#161A22" stroke="#2A323F" stroke-width="1.5"/>
    <text x="560" y="105" text-anchor="middle" fill="#E4E7EB" font-size="17">Worker</text>
    <text x="560" y="123" text-anchor="middle" fill="#5B6678" font-size="12" font-family="system-ui, sans-serif">3</text>
    <rect x="685" y="78" width="150" height="58" fill="#161A22" stroke="#2A323F" stroke-width="1.5"/>
    <text x="760" y="105" text-anchor="middle" fill="#E4E7EB" font-size="17">Worker</text>
    <text x="760" y="123" text-anchor="middle" fill="#5B6678" font-size="12" font-family="system-ui, sans-serif">N</text>
  </g>

  <!-- resonate server nodes (teal, single binary) -->
  <g filter="url(#teal-glow)">
    <rect x="95"  y="360" width="130" height="56" fill="#0C2421" stroke="#1EE3CF" stroke-width="1.5"/>
    <rect x="295" y="360" width="130" height="56" fill="#0C2421" stroke="#1EE3CF" stroke-width="1.5"/>
    <rect x="495" y="360" width="130" height="56" fill="#0C2421" stroke="#1EE3CF" stroke-width="1.5"/>
  </g>
  <g>
    <text x="160" y="385" text-anchor="middle" fill="#1EE3CF" font-size="15">Resonate</text>
    <text x="160" y="403" text-anchor="middle" fill="#7FE9DD" font-size="11" font-family="system-ui, sans-serif">single binary</text>
    <text x="360" y="385" text-anchor="middle" fill="#1EE3CF" font-size="15">Resonate</text>
    <text x="360" y="403" text-anchor="middle" fill="#7FE9DD" font-size="11" font-family="system-ui, sans-serif">single binary</text>
    <text x="560" y="385" text-anchor="middle" fill="#1EE3CF" font-size="15">Resonate</text>
    <text x="560" y="403" text-anchor="middle" fill="#7FE9DD" font-size="11" font-family="system-ui, sans-serif">single binary</text>
  </g>

  <!-- dashed "add as you scale" node -->
  <rect x="695" y="360" width="130" height="56" fill="none" stroke="#1EE3CF" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.7"/>
  <text x="760" y="384" text-anchor="middle" fill="#1EE3CF" font-size="22" opacity="0.85">+</text>
  <text x="760" y="404" text-anchor="middle" fill="#7FE9DD" font-size="11" font-family="system-ui, sans-serif" opacity="0.85">add as you scale</text>
</svg>
