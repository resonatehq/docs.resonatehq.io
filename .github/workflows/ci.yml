name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never cancel a push to main mid-commit.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & link-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` also runs `postbuild` (scripts/check-links.mjs), which
      # boots `next start`, smoke-checks the /llms.txt and /llms-full.txt route
      # handlers, and crawls every page. Internal broken links fail the build;
      # unreachable external links (e.g. localhost metrics/tracing demos) are
      # warn-only.
      - name: Build and check links
        run: npm run build

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Run gitleaks from its pinned image — no license key required, unlike the
      # gitleaks GitHub Action under an organization. Scans the working tree
      # (--no-git) against .gitleaks.toml, which allowlists doc placeholders.
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --no-git --config /repo/.gitleaks.toml --redact --no-banner --verbose
